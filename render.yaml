services:
  - type: web
    name: ingresso-festa-api
    env: node
    plan: starter
    rootDir: backend
    buildCommand: |
      npm install
      npx prisma generate
      npm run build
    startCommand: |
      npx prisma migrate deploy
      node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: file:/var/data/ingresso.db
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TRANSPORT_URL
        sync: false
      - key: QR_OUTPUT_DIR
        value: /var/data/qrcodes
    disk:
      name: ingresso-festa-storage
      mountPath: /var/data
      sizeGB: 1

  - type: static
    name: ingresso-festa-web
    buildCommand: |
      cd frontend
      npm install
      npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
