services:
  - type: web
    name: ingresso-festa-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: |
      npm install
      npx prisma generate
      npm run build
    startCommand: |
      npx prisma migrate deploy
      node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: file:/var/data/ingresso.db
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TRANSPORT_URL
        sync: false
      - key: QR_OUTPUT_DIR
        value: /var/data/qrcodes
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_RANGE
        value: Lista!A2:A
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEETS_AUTO_SYNC
        value: true
      - key: GOOGLE_SHEETS_SYNC_INTERVAL
        value: 10
    disk:
      name: ingresso-festa-storage
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: ingresso-festa-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
